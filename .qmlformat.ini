[General]
# Whether to insert a blank line between top-level functions
FunctionsSpacing=false
# Indentation in spaces (ignored when UseTabs=true)
IndentWidth=4
# Maximum line length before wrapping (-1 disables wrapping)
MaxColumnWidth=120
# Newline style: native | unix | windows | macos
NewlineType=unix
# Whether to normalize (reorder) properties/functions according to guidelines
NormalizeOrder=false
# Ensure spacing between objects/functions (applies with NormalizeOrder)
ObjectsSpacing=false
# Use tabs instead of spaces for indentation
UseTabs=false
