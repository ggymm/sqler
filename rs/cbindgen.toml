language = "C"
pragma_once = true
include_guard = "SQLER_H"
documentation = true
style = "both"
usize_is_size_t = true

autogen_warning = "// Auto-generated by cbindgen. Do not edit."

sys_includes = ["stdint.h"]

# Treat Rust-internal types as opaque forward declarations
opaque-types = ["Context"]

[parse]
# Try to expand for better type resolution (non-fatal if fails)
expand = true

[export]
include = ["sqler_version",
           "sqler_new","sqler_free","sqler_last_error","sqler_string_free",
           "sqler_connect","sqler_disconnect","sqler_run_sql",
           "sqler_redis_set","sqler_redis_get",
           "sqler_mongo_insert_one","sqler_mongo_find_one",
           "sqler_export_version","sqler_export_init_logger",
           "sqler_export_run_json","sqler_export_free_string",
           "sqler_export_run","sqler_export_query_to_csv",
           "SqlerDbType","SqlerExportFormat","SqlerDbConfig","SqlerExportOptions",
]

